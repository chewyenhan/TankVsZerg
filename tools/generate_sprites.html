<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Sprite Generator</title></head><body>
<h1>Tank vs Zerg — Sprite Generator</h1>
<div id="status"></div>
<script>
// ══════ DRAW FUNCTIONS (from BootScene.js) ══════
function drawTank(ctx, color, w, h, frame) {
    const c = '#' + color.toString(16).padStart(6, '0');
    const cx = w / 2, cy = h / 2;
    const angles = [0, Math.PI/6, Math.PI/3, Math.PI/2, 2*Math.PI/3, 5*Math.PI/6, Math.PI, -5*Math.PI/6, -2*Math.PI/3, -Math.PI/3, -Math.PI/6, 0];
    const angle = frame !== undefined ? angles[frame % 12] : 0;
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle);
    // Treads
    ctx.fillStyle = '#0d0d0d'; ctx.fillRect(-26, -18, 8, 36); ctx.fillRect(18, -18, 8, 36);
    ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 1;
    ctx.strokeRect(-26, -18, 8, 36); ctx.strokeRect(18, -18, 8, 36);
    ctx.fillStyle = '#1a1a1a';
    for (let i = -16; i <= 16; i += 3) { ctx.fillRect(-25, i, 6, 1.5); ctx.fillRect(19, i, 6, 1.5); }
    ctx.fillStyle = '#333'; ctx.fillRect(-25, -17, 6, 2); ctx.fillRect(19, -17, 6, 2);
    // Hull
    ctx.fillStyle = '#0a0a0a'; ctx.fillRect(-22, -15, 44, 30);
    ctx.fillStyle = c; ctx.fillRect(-20, -14, 40, 28);
    const darker = darkenColor(color, 0.3);
    ctx.fillStyle = darker; ctx.fillRect(-18, -12, 36, 6); ctx.fillRect(-18, 6, 36, 6);
    ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(-16, -4); ctx.lineTo(16, -4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-16, 4); ctx.lineTo(16, 4); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    [[-14,-12],[0,-12],[14,-12],[-14,12],[0,12],[14,12]].forEach(([rx, ry]) => { ctx.beginPath(); ctx.arc(rx, ry, 1.2, 0, Math.PI*2); ctx.fill(); });
    ctx.fillStyle = '#111'; ctx.fillRect(-20, -6, 5, 12);
    ctx.fillStyle = '#333';
    for (let i = -4; i <= 4; i += 2) ctx.fillRect(-19, i, 3, 1);
    // Turret
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.arc(0, 0, 9, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = darker; ctx.beginPath(); ctx.arc(0, 0, 9, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = c; ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.beginPath(); ctx.arc(-1, -2, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = darker; ctx.beginPath(); ctx.arc(-1, 0, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.beginPath(); ctx.arc(-2, -1, 1.5, 0, Math.PI*2); ctx.fill();
    // Barrel
    ctx.fillStyle = '#111'; ctx.fillRect(4, -2.5, 22, 5);
    ctx.fillStyle = '#3a3a3a'; ctx.fillRect(6, -2, 20, 4);
    ctx.fillStyle = '#555'; ctx.fillRect(6, -2, 20, 1.5);
    ctx.fillStyle = '#2a2a2a'; ctx.fillRect(22, -3.5, 6, 7);
    ctx.fillStyle = '#444'; ctx.fillRect(22, -2, 6, 1); ctx.fillRect(22, 2, 6, 1);
    ctx.fillStyle = '#111'; ctx.fillRect(27, -2, 2, 4);
    ctx.fillStyle = '#ffffaa'; ctx.fillRect(18, -1, 3, 2);
    ctx.fillStyle = 'rgba(255,255,200,0.4)'; ctx.fillRect(21, -1.5, 4, 3);
    ctx.restore();
}
function darkenColor(color, amount) {
    const r = Math.floor(((color>>16)&0xff)*(1-amount));
    const g = Math.floor(((color>>8)&0xff)*(1-amount));
    const b = Math.floor((color&0xff)*(1-amount));
    return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
}
function drawZergling(ctx, w, h, frame) {
    const cx=w/2,cy=h/2; const f=frame%4; const step=Math.sin(f*Math.PI/2)*2.5;
    ctx.save(); ctx.translate(cx,cy);
    ctx.strokeStyle='#6611aa';ctx.lineWidth=1.5;
    [{x:-8,y:-4},{x:-4,y:5},{x:0,y:-5},{x:4,y:6},{x:8,y:-4},{x:2,y:6}].forEach((leg,i)=>{
        const phase=step*(i%2===0?1:-1);
        ctx.beginPath();ctx.moveTo(leg.x,leg.y);ctx.lineTo(leg.x+(leg.x>0?7:-7)+phase,leg.y+7);ctx.stroke();
        ctx.fillStyle='#551199';ctx.beginPath();ctx.arc(leg.x+(leg.x>0?3:-3)+phase*0.5,leg.y+3.5,1.5,0,Math.PI*2);ctx.fill();
    });
    ctx.fillStyle='#1a3300';ctx.beginPath();ctx.ellipse(0,1,11,7,0,0,Math.PI*2);ctx.fill();
    const bg=ctx.createLinearGradient(0,-7,0,7);bg.addColorStop(0,'#55cc33');bg.addColorStop(0.5,'#338811');bg.addColorStop(1,'#226600');
    ctx.fillStyle=bg;ctx.beginPath();ctx.ellipse(0,0,10,6.5,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#227700';ctx.lineWidth=1;
    for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(i*3,-5);ctx.lineTo(i*3,4);ctx.stroke();}
    ctx.fillStyle='rgba(180,255,100,0.3)';ctx.beginPath();ctx.ellipse(-2,-2,4,2,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#2a7700';ctx.beginPath();ctx.ellipse(9,-1,5,4,-0.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#338811';ctx.beginPath();ctx.ellipse(8,-2,3,2.5,-0.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff0000';ctx.beginPath();ctx.arc(11,-2.5,1.8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff6644';ctx.beginPath();ctx.arc(10.5,-3,0.8,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#441100';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(13,-3);ctx.lineTo(16+step*0.3,-5);ctx.stroke();
    ctx.beginPath();ctx.moveTo(13,1);ctx.lineTo(16-step*0.3,3);ctx.stroke();
    ctx.strokeStyle='#55cc33';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(11,-5);ctx.quadraticCurveTo(15,-10,18,-9);ctx.stroke();
    ctx.beginPath();ctx.moveTo(11,-3);ctx.quadraticCurveTo(14,-8,17,-7);ctx.stroke();
    ctx.fillStyle='#441100';ctx.beginPath();ctx.arc(6,-6,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(6,6,2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#661800';[[6,-6],[6,6]].forEach(([cx2,cy2])=>{ctx.beginPath();ctx.moveTo(cx2+2,cy2-2);ctx.lineTo(cx2+5,cy2-4);ctx.lineTo(cx2+2,cy2+1);ctx.closePath();ctx.fill();});
    ctx.restore();
}
// Abbreviated versions for other zerg types (same as BootScene.js)
function drawHydra(ctx,w,h,frame){const cx=w/2,cy=h/2,f=frame%4,flap=Math.sin(f*Math.PI/2)*3;ctx.save();ctx.translate(cx,cy);ctx.save();ctx.globalAlpha=0.55;ctx.fillStyle='#8855cc';ctx.beginPath();ctx.moveTo(-2,-6);ctx.quadraticCurveTo(-10,-18-flap,-2,-20-flap);ctx.quadraticCurveTo(6,-16-flap,2,-10);ctx.closePath();ctx.fill();ctx.strokeStyle='#6633aa';ctx.lineWidth=0.8;ctx.stroke();ctx.beginPath();ctx.moveTo(-2,6);ctx.quadraticCurveTo(-10,18+flap,-2,20+flap);ctx.quadraticCurveTo(6,16+flap,2,10);ctx.closePath();ctx.fill();ctx.stroke();ctx.restore();const bg2=ctx.createLinearGradient(0,-8,0,8);bg2.addColorStop(0,'#9944cc');bg2.addColorStop(0.5,'#7722aa');bg2.addColorStop(1,'#551188');ctx.fillStyle=bg2;ctx.beginPath();ctx.ellipse(0,0,14,7,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#bb77dd';ctx.beginPath();ctx.ellipse(-1,2,6,3,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#44aa44';[-10,-6,-2,2,6,10].forEach(sx=>{ctx.beginPath();ctx.moveTo(sx,-7);ctx.lineTo(sx-2,-12);ctx.lineTo(sx+2,-12);ctx.closePath();ctx.fill();});ctx.fillStyle='#661199';ctx.beginPath();ctx.ellipse(13,-3,7,5,0.3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#8833bb';ctx.beginPath();ctx.moveTo(10,-7);ctx.quadraticCurveTo(15,-14,18,-8);ctx.quadraticCurveTo(15,-5,10,-5);ctx.closePath();ctx.fill();ctx.fillStyle='#ffaa00';ctx.beginPath();ctx.ellipse(15.5,-4.5,2,1.5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(16,-4.5,1,1.2,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffffcc';ctx.beginPath();ctx.moveTo(18,-3);ctx.lineTo(21,-5);ctx.lineTo(19,-2);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(18,0);ctx.lineTo(21,-1);ctx.lineTo(19,1);ctx.closePath();ctx.fill();ctx.fillStyle='#7722aa';ctx.beginPath();ctx.moveTo(-13,-1);ctx.quadraticCurveTo(-18,-3,-20,0);ctx.quadraticCurveTo(-18,3,-13,1);ctx.closePath();ctx.fill();ctx.restore();}
function drawDrone(ctx,w,h,frame){const cx=w/2,cy=h/2,f=frame%4,flap=Math.sin(f*Math.PI/2)*4;ctx.save();ctx.translate(cx,cy);ctx.save();ctx.globalAlpha=0.45;ctx.fillStyle='#ddcc88';ctx.beginPath();ctx.moveTo(0,-4);ctx.quadraticCurveTo(-10,-16-flap,-4,-20-flap);ctx.quadraticCurveTo(4,-16-flap,2,-8);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(0,4);ctx.quadraticCurveTo(-10,16+flap,-4,20+flap);ctx.quadraticCurveTo(4,16+flap,2,8);ctx.closePath();ctx.fill();ctx.restore();const bg3=ctx.createLinearGradient(0,-5,0,5);bg3.addColorStop(0,'#eebb44');bg3.addColorStop(1,'#996622');ctx.fillStyle=bg3;ctx.beginPath();ctx.ellipse(0,0,8,5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#885511';ctx.fillRect(-3,-4,6,1.2);ctx.fillRect(-2,2,6,1.2);ctx.fillStyle='#aa7722';ctx.beginPath();ctx.arc(8,0,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#222';ctx.beginPath();ctx.ellipse(10,-2,3.5,2.5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#444';ctx.beginPath();ctx.ellipse(9.5,-2.5,1.5,1,0,0,Math.PI*2);ctx.fill();ctx.restore();}
function drawRoach(ctx,w,h,frame){const cx=w/2,cy=h/2,f=frame%4,step=Math.sin(f*Math.PI/2)*2;ctx.save();ctx.translate(cx,cy);ctx.strokeStyle='#553311';ctx.lineWidth=2;[[-7,-6,-1],[0,-8,0],[7,-6,1],[-7,6,-1],[0,8,0],[7,6,1]].forEach(([lx,ly,pd])=>{ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx+(lx>0?8:-8)+step*pd,ly+(ly>0?6:-6));ctx.stroke();ctx.fillStyle='#331100';ctx.beginPath();ctx.arc(lx+(lx>0?8:-8)+step*pd,ly+(ly>0?6:-6),1.8,0,Math.PI*2);ctx.fill();});ctx.fillStyle='#331100';ctx.beginPath();ctx.ellipse(0,1,15,10,0,0,Math.PI*2);ctx.fill();const sg=ctx.createLinearGradient(0,-10,0,10);sg.addColorStop(0,'#cc8833');sg.addColorStop(0.4,'#aa6622');sg.addColorStop(1,'#663311');ctx.fillStyle=sg;ctx.beginPath();ctx.ellipse(0,0,14,9.5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#dd9944';ctx.beginPath();ctx.ellipse(-1,-3,7,5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,220,150,0.25)';ctx.beginPath();ctx.ellipse(-3,-4,4,2,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#774411';ctx.beginPath();ctx.arc(13,0,7,0,Math.PI*2);ctx.fill();ctx.fillStyle='#995522';ctx.beginPath();ctx.arc(12,-1,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#441100';ctx.beginPath();ctx.moveTo(18,-4);ctx.lineTo(23,-7);ctx.lineTo(19,-3);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(18,4);ctx.lineTo(23,7);ctx.lineTo(19,3);ctx.closePath();ctx.fill();ctx.fillStyle='#220000';ctx.beginPath();ctx.arc(22.5,-6.5,1.2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(22.5,6.5,1.2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff8800';ctx.beginPath();ctx.arc(16,-3,2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(16,3,2,0,Math.PI*2);ctx.fill();ctx.restore();}
function drawUltra(ctx,w,h,frame){const cx=w/2,cy=h/2,f=frame%4,stomp=Math.sin(f*Math.PI/2)*3;ctx.save();ctx.translate(cx,cy);ctx.strokeStyle='#551133';ctx.lineWidth=2.5;[[-12,-10,-1],[12,-10,1],[-12,10,-1],[12,10,1]].forEach(([lx,ly,dir])=>{const p=stomp*dir;ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx+(lx>0?10:-10)+p,ly+(ly>0?8:-8));ctx.stroke();ctx.fillStyle='#330022';ctx.beginPath();ctx.arc(lx+(lx>0?10:-10)+p,ly+(ly>0?8:-8),3,0,Math.PI*2);ctx.fill();});const bg4=ctx.createLinearGradient(0,-15,0,15);bg4.addColorStop(0,'#994466');bg4.addColorStop(0.5,'#772244');bg4.addColorStop(1,'#441122');ctx.fillStyle=bg4;ctx.beginPath();ctx.ellipse(0,0,20,14,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#883355';ctx.beginPath();ctx.ellipse(-6,-4,10,7,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#994466';ctx.beginPath();ctx.ellipse(-8,-5,6,4,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#330022';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(-14,-6);ctx.lineTo(-10,8);ctx.stroke();ctx.beginPath();ctx.moveTo(-6,-10);ctx.lineTo(-2,10);ctx.stroke();ctx.fillStyle='#ccccaa';ctx.beginPath();ctx.moveTo(20,-8);ctx.quadraticCurveTo(28,-18,32,-16);ctx.quadraticCurveTo(28,-10,20,-6);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(20,8);ctx.quadraticCurveTo(28,18,32,16);ctx.quadraticCurveTo(28,10,20,6);ctx.closePath();ctx.fill();ctx.fillStyle='#661133';ctx.beginPath();ctx.arc(17,-1,9,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff2200';ctx.beginPath();ctx.arc(20,-4,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(20,4,2.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#661144';ctx.beginPath();ctx.arc(-16,-12-stomp*0.5,7,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(-16,12+stomp*0.5,7,0,Math.PI*2);ctx.fill();ctx.restore();}

// ══════ GENERATE AND DOWNLOAD ══════
function makeAtlas(key, fw, fh, frames, drawFn) {
    const canvas = document.createElement('canvas');
    canvas.width = fw * frames;
    canvas.height = fh;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    for (let f = 0; f < frames; f++) {
        ctx.save();
        ctx.translate(f * fw + fw / 2, fh / 2);
        drawFn(ctx, fw, fh, f);
        ctx.restore();
    }
    return canvas;
}

function downloadCanvas(canvas, filename) {
    canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename; a.click();
        URL.revokeObjectURL(url);
        document.getElementById('status').innerHTML += '<br>✅ ' + filename;
    });
}

// Generate all sprites
setTimeout(() => {
    const status = document.getElementById('status');

    // Tanks (12 frames each, but we'll just use frame 0 since code rotates)
    status.textContent = 'Generating sprites...';

    // Actually generate full 12-frame atlases for backward compat
    downloadCanvas(makeAtlas('tank_p1', 64, 56, 12, (ctx,w,h,f)=>drawTank(ctx,0xcc2222,w,h,f)), 'tank_p1.png');
    downloadCanvas(makeAtlas('tank_p2', 64, 56, 12, (ctx,w,h,f)=>drawTank(ctx,0x2244cc,w,h,f)), 'tank_p2.png');

    // Zerg (4 frames)
    downloadCanvas(makeAtlas('zerg_lings', 40, 30, 4, drawZergling), 'zerg_lings.png');
    downloadCanvas(makeAtlas('zerg_hydra', 48, 38, 4, drawHydra), 'zerg_hydra.png');
    downloadCanvas(makeAtlas('zerg_drone', 40, 30, 4, drawDrone), 'zerg_drone.png');
    downloadCanvas(makeAtlas('zerg_roach', 48, 38, 4, drawRoach), 'zerg_roach.png');
    downloadCanvas(makeAtlas('zerg_ultra', 72, 56, 4, drawUltra), 'zerg_ultra.png');

    status.textContent += '\nDone! Check downloads.';
}, 500);
</script>
