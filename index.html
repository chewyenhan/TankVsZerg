<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tank vs Zerg — Side-Scrolling Defense</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-container"></div>

<!-- HUD overlay (positioned on top of canvas) -->
<div id="hud" style="display:none;">
    <div id="hud-top">
        <div id="p1-hud">
            <span class="hud-label" style="color:#ff4444;">&#9876; P1</span>
            <div class="hp-bar"><div class="hp-fill hp-fill-p1" id="p1-hp"></div></div>
            <div class="shield-bar"><div class="shield-fill shield-fill-p1" id="p1-shield"></div></div>
            <span class="hud-score" id="p1-score">Score: 0</span>
            <span class="hud-nuke" id="p1-nuke">☢ x0</span>
            <span class="hud-swarm" id="p1-swarm"></span>
        </div>
        <div id="center-info">
            <span id="wave-display">WAVE 1</span>
            <span id="timer-display">0:00</span>
            <span id="nuke-display">☢ x0</span>
            <span id="round-display">SOLO SURVIVAL</span>
        </div>
        <div id="p2-hud">
            <span class="hud-label" style="color:#4488ff;">&#9876; P2</span>
            <div class="hp-bar"><div class="hp-fill hp-fill-p2" id="p2-hp"></div></div>
            <div class="shield-bar"><div class="shield-fill shield-fill-p2" id="p2-shield"></div></div>
            <span class="hud-score" id="p2-score">Score: 0</span>
            <span class="hud-nuke" id="p2-nuke">☢ x0</span>
            <span class="hud-swarm" id="p2-swarm"></span>
        </div>
    </div>
</div>

<!-- Wave announcement overlay -->
<div id="wave-announce" style="display:none;">
    <span id="wave-announce-text"></span>
</div>

<!-- Pause overlay -->
<div id="pause-overlay" style="display:none;">
    <div id="pause-box">
        <h2>PAUSED</h2>
        <p>Press ESC to resume</p>
        <button class="pause-btn" onclick="resumeGame()">Resume</button>
        <button class="pause-btn" style="color:#ff4444;border-color:#ff4444;" onclick="forfeitRound('p1')">P1 Forfeit</button>
        <button class="pause-btn" style="color:#4488ff;border-color:#4488ff;" onclick="forfeitRound('p2')">P2 Forfeit</button>
    </div>
</div>

<!-- Tech Tree overlay -->
<div id="techtree-overlay" style="display:none;">
    <div id="techtree-box">
        <h2>🔬 TECH TREE</h2>
        <div style="display:flex;gap:8px;justify-content:center;margin-bottom:8px;">
            <button id="techtree-tab-p1" class="techtree-tab active" onclick="openTechTree('p1')">P1</button>
            <button id="techtree-tab-p2" class="techtree-tab" onclick="openTechTree('p2')">P2</button>
        </div>
        <div id="techtree-points" style="color:#ffcc00;font-size:18px;margin-bottom:12px;">Available Points: 0</div>
        <div id="techtree-grid"></div>
        <div class="keybind-actions" style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px;">
            <button class="pause-btn" style="background:#2a5a2a;color:#fff;font-weight:bold;" onclick="exportTechTree(_techTreePlayer)">📥 EXPORT</button>
            <button class="pause-btn" style="background:#5a3a1a;color:#fff;font-weight:bold;" onclick="importTechTree(_techTreePlayer)">📤 IMPORT</button>
            <button class="pause-btn" style="background:#c9a44c;color:#000;font-weight:bold;" onclick="closeTechTree()">CLOSE</button>
        </div>
    </div>
</div>

<!-- Keybinding overlay -->
<div id="keybind-overlay" style="display:none;">
    <div id="keybind-box">
        <h2>⚙ CUSTOMIZE CONTROLS</h2>
        <div id="keybind-grid">
            <div class="keybind-header">Player 1 (Red)</div>
            <div class="keybind-header">Action</div>
            <div class="keybind-header">Key</div>
            <div class="keybind-header">Player 2 (Blue)</div>
            <div class="keybind-header">Action</div>
            <div class="keybind-header">Key</div>
        </div>
        <div class="keybind-actions">
            <p style="color:#aaa;font-size:14px;">Click a key button, then press the new key on your keyboard.</p>
            <button class="pause-btn" id="keybind-save-btn" style="background:#c9a44c;color:#000;font-weight:bold;margin-top:12px;">SAVE & CLOSE</button>
            <button class="pause-btn" style="margin-top:6px;" onclick="closeKeybinds()">CANCEL</button>
        </div>
    </div>
</div>

<!-- Boss HP bar (shown during boss fight) -->
<div id="boss-hp-bar" style="display:none;">
    <span id="boss-hp-label">BOSS</span>
    <div class="boss-hp-track"><div class="boss-hp-fill" id="boss-hp-fill"></div></div>
</div>

<!-- Game Over overlay -->
<div id="gameover-overlay" style="display:none;">
    <div id="gameover-box">
        <h2 id="gameover-title"></h2>
        <div id="gameover-stats"></div>
        <button class="pause-btn" id="rematch-btn" onclick="rematch()">REMATCH</button>
        <button class="pause-btn" onclick="returnToMenu()">MAIN MENU</button>
    </div>
</div>

<!-- Phaser CDN (global) -->
<script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js"></script>
<!-- Our game (ES module, has access to global Phaser) -->
<script type="module" src="game.js?v=2"></script>
</body>
</html>
